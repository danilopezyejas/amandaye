{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white border-l-4 border-amandaye-orange rounded-r-xl shadow-lg p-6 flex items-start gap-4">
        <div class="text-amandaye-orange mt-1">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <div>
            <h2 class="text-lg font-bold text-gray-900 mb-1">Persona no encontrada</h2>
            <p class="text-sm text-gray-600">No se encontró ningún registro asociado a la cédula <strong class="text-amandaye-navy">{{ cedula }}</strong> en nuestra base de datos.</p>
            
            <div class="mt-6">
                <a href="javascript:history.back()" class="inline-flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-800 text-sm font-semibold rounded-lg transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Volver a intentar
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
