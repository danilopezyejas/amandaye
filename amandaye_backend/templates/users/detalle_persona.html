{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden">
    <div class="bg-amandaye-navy px-8 py-6 border-b-4 border-amandaye-orange relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -right-10 -bottom-10 opacity-10">
            <svg class="w-40 h-40 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </div>
        
        <h2 class="text-3xl font-black text-white relative z-10">{{ persona.nombre_completo }}</h2>
        <div class="mt-2 inline-flex items-center gap-2 bg-amandaye-orange/20 px-3 py-1 rounded-full text-amandaye-yellow text-sm font-semibold relative z-10">
            <span>Socio Activo</span>
        </div>
    </div>

    <div class="p-8">
        <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-6 border-b pb-2">Datos Personales</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                <span class="block text-xs uppercase text-gray-500 font-semibold mb-1">Documento (Cédula)</span>
                <span class="text-lg font-bold text-gray-800">{{ persona.Cedula }}</span>
            </div>
            
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                <span class="block text-xs uppercase text-gray-500 font-semibold mb-1">Número de Socio</span>
                <span class="text-lg font-bold text-amandaye-blue">{{ persona.numeroSocio }}</span>
            </div>
            
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-100 md:col-span-2">
                <span class="block text-xs uppercase text-gray-500 font-semibold mb-1">Correo Electrónico</span>
                <span class="text-lg font-medium text-gray-800">{{ persona.Correo|default:"No registrado" }}</span>
            </div>
        </div>

        <div class="mt-10 flex gap-4 pt-6 border-t border-gray-100 justify-end">
            <a href="javascript:history.back()" class="px-6 py-2.5 rounded-lg bg-gray-200 text-gray-700 font-bold hover:bg-gray-300 transition-colors">Atrás</a>
            <a href="http://localhost:8000/admin/usuarios/personas/{{ persona.Cedula }}/change/" target="_blank" class="px-6 py-2.5 rounded-lg bg-amandaye-orange text-white font-bold hover:bg-orange-600 transition-colors shadow-md shadow-orange-500/30">Editar en Admin</a>
        </div>
    </div>
</div>
{% endblock %}
